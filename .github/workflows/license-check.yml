name: License Check

on:
  push:
    paths:
      - 'requirements*.txt'
  pull_request:
    paths:
      - 'requirements*.txt'

permissions:
  contents: read

jobs:
  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pip-licenses -r requirements.txt
      - name: Check licenses
        run: |
          pip-licenses --order=license --format=markdown
          pip-licenses \
            --fail-on="GNU General Public License v2" \
            --fail-on="GNU General Public License v3" \
            --fail-on="GNU Affero General Public License v3" \
            --fail-on="Server Side Public License" \
            --fail-on="GNU Lesser General Public License v2" \
            --fail-on="GNU Lesser General Public License v3"
